<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueGuard v8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06101e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:"Courier New",monospace;overflow:hidden;}
canvas{display:block;border:2px solid #006cbe;}
#overlay{position:fixed;inset:0;background:rgba(6,10,30,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:1000;font-family:"Courier New",monospace;}
#overlay.hidden{display:none;}
#overlay h2{color:#50c8ff;font-size:26px;letter-spacing:4px;}
.crow{display:flex;align-items:center;gap:12px;}
.cdot{width:13px;height:13px;border-radius:50%;background:#ff3737;box-shadow:0 0 8px #ff3737;transition:all .3s;}
.cdot.ok{background:#37d75f;box-shadow:0 0 8px #37d75f;}
.cdot.wait{background:#ffaf00;box-shadow:0 0 8px #ffaf00;animation:pulse 1s infinite;}
.clabel{color:#d2ebff;font-size:15px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#wsurl{color:#4a6a8a;font-size:11px;}
#starthint{color:#7896be;font-size:13px;animation:pulse 1.2s infinite;}
#ctrl-urls{display:flex;gap:24px;margin-top:2px;}
.ctrl-url-box{display:flex;flex-direction:column;align-items:center;gap:4px;}
.ctrl-url-lbl{font-size:11px;font-weight:bold;letter-spacing:2px;}
.ctrl-url-lbl.p1c{color:#5a96c8;}.ctrl-url-lbl.p2c{color:#ffc832;}
.ctrl-url-link{color:#4a6a8a;font-size:10px;text-decoration:none;}
.ctrl-url-link:hover{color:#50c8ff;}
</style>
</head>
<body>
<div id="overlay">
  <h2>BLUEGUARD</h2>
  <div id="wsurl">Connecting...</div>
  <div class="crow"><div class="cdot wait" id="dot-server"></div><span class="clabel">Server</span></div>
  <div class="crow"><div class="cdot" id="dot-p1"></div><span class="clabel">Player 1</span></div>
  <div class="crow"><div class="cdot" id="dot-p2"></div><span class="clabel">Player 2</span></div>
  <div id="starthint" style="display:none">The two players are ready !</div>
  <div id="ctrl-urls">
    <div class="ctrl-url-box">
      <span class="ctrl-url-lbl p1c">PLAYER 1</span>
      <a id="ctrl-link1" class="ctrl-url-link" href="#" target="_blank">—</a>
    </div>
    <div class="ctrl-url-box">
      <span class="ctrl-url-lbl p2c">PLAYER 2</span>
      <a id="ctrl-link2" class="ctrl-url-link" href="#" target="_blank">—</a>
    </div>
  </div>
</div>
<canvas id="c"></canvas>
<script>
// ════════════════════════════════════════════════
// WEBSOCKET
// ════════════════════════════════════════════════
const WS_PORT=8765;
const WS_URL="ws://"+location.hostname+":"+WS_PORT;
let wsConn=false,p1Conn=false,p2Conn=false,ws=null;
const pad={
  p1:{dx:0,dy:0,netJust:false,netHeld:false,backJust:false},
  p2:{dx:0,dy:0,netJust:false,netHeld:false,backJust:false}
};
const shopNav={p1timer:0,p2timer:0,COOLDOWN:0.32};

function connectWS(){
  const ip=location.hostname;
  document.getElementById("wsurl").textContent="ws://"+ip+":"+WS_PORT;
  // Mettre à jour les liens controller
  const base="http://"+ip+":8080/controller.html";
  const l1=document.getElementById("ctrl-link1");
  const l2=document.getElementById("ctrl-link2");
  if(l1){l1.href=base+"?player=1";l1.textContent=ip+"/ctrl?p=1";}
  if(l2){l2.href=base+"?player=2";l2.textContent=ip+"/ctrl?p=2";}
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    wsConn=true;
    ws.send(JSON.stringify({type:"register",role:"game"}));
    document.getElementById("dot-server").className="cdot ok";
  };
  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    if(d.type==="player_connected"){
      if(d.role==="p1"){p1Conn=true;document.getElementById("dot-p1").className="cdot ok";}
      if(d.role==="p2"){p2Conn=true;document.getElementById("dot-p2").className="cdot ok";}
      if(p1Conn&&p2Conn){
        document.getElementById("starthint").style.display="block";
        // Hide overlay after short delay so players see the green dots
        setTimeout(()=>{ document.getElementById("overlay").classList.add("hidden"); }, 1200);
      }
    }
    if(d.type==="player_disconnected"){
      if(d.role==="p1"){p1Conn=false;document.getElementById("dot-p1").className="cdot";}
      if(d.role==="p2"){p2Conn=false;document.getElementById("dot-p2").className="cdot";}
      document.getElementById("starthint").style.display="none";
    }
    if(d.type==="input"){
      const p=d.from==="p1"?pad.p1:pad.p2;
      p.dx=d.dx||0; p.dy=d.dy||0;
    }
    if(d.type==="button"){
      const p=d.from==="p1"?pad.p1:pad.p2;
      if(d.action==="net_press"){if(!p.netHeld)p.netJust=true;p.netHeld=true;}
      if(d.action==="net_release"){p.netHeld=false;}
      if(d.action==="back_press"){p.backJust=true;}
    }
  };
  ws.onclose=()=>{
    wsConn=false;
    document.getElementById("dot-server").className="cdot wait";
    document.getElementById("overlay").classList.remove("hidden");
    setTimeout(connectWS,2000);
  };
}
function sendWS(d){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(d));}
function consumeNet(pid){const p=pid===1?pad.p1:pad.p2;if(p.netJust){p.netJust=false;return true;}return false;}
function anyNet(){return consumeNet(1)||consumeNet(2);}
function consumeBack(){
  if(pad.p1.backJust){pad.p1.backJust=false;return true;}
  if(pad.p2.backJust){pad.p2.backJust=false;return true;}
  return false;
}

function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(a+Math.random()*(b-a+1));}
function choice(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

}
function TC(text,y,font,color){T(text,SW/2,y,font,color,"center","top");}
function TW(text,font){ctx.font=font;return ctx.measureText(text).width;}
function RR(x,y,w,h,r,fill,stroke,sw){
  sw=sw||2;ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function GBG(c1,c2){
  const g=ctx.createLinearGradient(0,0,0,SH);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;ctx.fillRect(0,0,SW,SH);
}
function LN(x1,y1,x2,y2,color,w){
  w=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.stroke();
}
function lerpC(a,b,t){
  const ah=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const bh=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  return "rgb("+Math.round(ah[0]+(bh[0]-ah[0])*t)+","+Math.round(ah[1]+(bh[1]-ah[1])*t)+","+Math.round(ah[2]+(bh[2]-ah[2])*t)+")";
}
function easeOut(t){return 1-(1-t)*(1-t);}
function easeIn(t){return t*t;}
function easeIO(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

class Fish{
  constructor(x,y,baby,prot){
    baby=baby||false;prot=prot||false;
    this.x=x;this.y=y;
    const a=rand(0,Math.PI*2),sp=rand(0.3,FISH_SPD);
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.baby=baby;this.protected=prot;
    this.age=0;this.size=baby?4:7;this.dt=randInt(40,150);
    this.pcolor=prot?choice(PROT_COLORS):null;
    this.wobble=rand(0,Math.PI*2);this.wobbleSpeed=rand(1.5,3.0);
  }
  coinValue(){return this.baby?BABY_PEN:FISH_VAL;}
  update(bounds,dt){
    this.age++;this.wobble+=this.wobbleSpeed*(dt||0.016);
    if(this.baby&&this.age>220){this.baby=false;this.size=7;}
    if(--this.dt<=0){
      const a=rand(0,Math.PI*2),sp=rand(0.2,FISH_SPD);
      this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;this.dt=randInt(40,150);
    }
    this.x+=this.vx;this.y+=this.vy;
    const[x0,y0,x1,y1]=bounds;
    if(this.x<x0+12){this.x=x0+12;this.vx=Math.abs(this.vx);}
    if(this.x>x1-12){this.x=x1-12;this.vx=-Math.abs(this.vx);}
    if(this.y<y0+12){this.y=y0+12;this.vy=Math.abs(this.vy);}
    if(this.y>y1-12){this.y=y1-12;this.vy=-Math.abs(this.vy);}
  }
  draw(ox){
    ox=ox||0;
    const px=this.x+ox,py=this.y;
    const color=this.protected?this.pcolor:(this.baby?CB:CF);
    const a=Math.atan2(this.vy,this.vx),sz=this.size;
    const wob=Math.sin(this.wobble)*0.18;
    ctx.save();ctx.translate(px,py);ctx.rotate(a+wob);
    ctx.beginPath();ctx.ellipse(0,0,sz*1.6,sz*0.8,0,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.beginPath();ctx.arc(sz*0.8,-sz*0.2,sz*0.22,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(sz*0.85,-sz*0.2,sz*0.1,0,Math.PI*2);ctx.fillStyle="#1a1a2e";ctx.fill();
    ctx.beginPath();ctx.moveTo(-sz*1.3,0);ctx.lineTo(-sz*2,-sz*0.7);ctx.lineTo(-sz*2,sz*0.7);
    ctx.closePath();ctx.fillStyle=color;ctx.globalAlpha=0.85;ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.moveTo(0,-sz*0.8);ctx.lineTo(sz*0.5,-sz*1.4);ctx.lineTo(sz,-sz*0.7);
    ctx.fillStyle=color;ctx.globalAlpha=0.6;ctx.fill();ctx.globalAlpha=1;
    ctx.restore();
    if(this.protected&&!this.baby){
      ctx.font="bold 11px Courier New";ctx.fillStyle="#fff";ctx.textAlign="center";
      ctx.fillText("*",px,py-sz-7);
    }
  }
}

class NetAnim{
  constructor(x,y,r,color){this.x=x;this.y=y;this.r=r;this.color=color;this.dur=0.45;this.elapsed=0;this.active=true;}
  update(dt){this.elapsed+=dt;if(this.elapsed>=this.dur)this.active=false;}
  draw(ox){
    ox=ox||0;if(!this.active)return;
    const al=Math.max(0,1-this.elapsed/this.dur);
    const px=this.x+ox,py=this.y,r=this.r*(1+this.elapsed/this.dur*0.3);
    ctx.save();ctx.globalAlpha=al*0.85;
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.strokeStyle=this.color;ctx.lineWidth=3;ctx.stroke();
    ctx.globalAlpha=al*0.25;
    const steps=Math.floor(r/12);
    for(let i=-steps;i<=steps;i++){
      const d=i*12;
      ctx.beginPath();ctx.moveTo(px+d,py-r);ctx.lineTo(px+d,py+r);ctx.strokeStyle=this.color;ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.moveTo(px-r,py+d);ctx.lineTo(px+r,py+d);ctx.stroke();
    }
    ctx.restore();
  }
}

class Boat{
  constructor(pid,btype,x,y){
    this.pid=pid;this.boatType=btype;this.x=x;this.y=y;
    this.coinsRound=0;this.coinsTotal=0;
    this.biodivUpgrade=false;this.autoNet=false;
    this.protectedCaughtTotal=0;
    this.cd=0;this.netAnim=null;this.bobOffset=rand(0,Math.PI*2);
    this._apply(btype);
  }
  _apply(t){
    if(t==="INDUSTRIAL"){this.speed=IND_SPD;this.netR=IND_NR;this.catchMax=IND_CATCH;this.cdMax=IND_CD;this.color=IND_COL;this.label="INDUSTRIAL";}
    else{this.speed=ART_SPD;this.netR=ART_NR;this.catchMax=ART_CATCH;this.cdMax=ART_CD;this.color=ART_COL;this.label="ARTISANAL";}
  }
  get canFish(){return this.cd<=0;}
  reset(){this.coinsRound=0;this.cd=0;this.netAnim=null;}
  update(dt,bounds){
    const[x0,y0,x1,y1]=bounds;
    const p=this.pid===1?pad.p1:pad.p2;
    let dx=p.dx,dy=p.dy;
    if(this.pid===1){
      if(keys["KeyZ"]||keys["KeyW"])dy-=1;if(keys["KeyS"])dy+=1;
      if(keys["KeyQ"]||keys["KeyA"])dx-=1;if(keys["KeyD"])dx+=1;
    } else {
      if(keys["ArrowUp"])dy-=1;if(keys["ArrowDown"])dy+=1;
      if(keys["ArrowLeft"])dx-=1;if(keys["ArrowRight"])dx+=1;
    }
    const len=Math.sqrt(dx*dx+dy*dy);if(len>1){dx/=len;dy/=len;}
    this.x=clamp(this.x+dx*this.speed,x0+24,x1-24);
    this.y=clamp(this.y+dy*this.speed,y0+24,y1-24);
    this.bobOffset+=dt*1.8;
    if(this.cd>0)this.cd-=dt;
    if(this.netAnim){this.netAnim.update(dt);if(!this.netAnim.active)this.netAnim=null;}
  }
  throwNet(){
    if(!this.canFish)return false;
    this.cd=this.cdMax;this.netAnim=new NetAnim(this.x,this.y,this.netR,this.color);return true;
  }
  draw(ox){
    ox=ox||0;
    const px=this.x+ox,py=this.y+Math.sin(this.bobOffset)*2.5;
    const sc=this.boatType==="INDUSTRIAL"?1.4:1.0;
    ctx.save();ctx.translate(px,py);
    if(this.boatType==="INDUSTRIAL"){
      ctx.beginPath();ctx.moveTo(-28,6);ctx.lineTo(28,6);ctx.lineTo(32,-2);ctx.lineTo(26,-10);ctx.lineTo(-26,-10);ctx.lineTo(-32,-2);
      ctx.closePath();ctx.fillStyle=this.color;ctx.fill();ctx.strokeStyle="#ffffff33";ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle="#c8a060";ctx.fillRect(-18,-10,36,5);
      ctx.fillStyle="#9a7040";ctx.fillRect(-10,-24,20,15);
      ctx.fillStyle="#88ccff55";ctx.fillRect(-6,-21,5,8);ctx.fillRect(1,-21,5,8);
      ctx.fillStyle="#6a5030";ctx.fillRect(-8,-36,6,14);ctx.fillRect(2,-34,6,12);
      ctx.fillStyle="#444";ctx.fillRect(-10,-38,10,4);ctx.fillRect(0,-36,10,4);
      const tt=performance.now()/1000;
      for(let i=0;i<3;i++){const oy=Math.sin(tt*2+i)*3;ctx.beginPath();ctx.arc(-5,-44-i*6+oy,3+i,0,Math.PI*2);ctx.fillStyle="rgba(180,180,180,"+(0.3-i*0.08)+")";ctx.fill();}
      ctx.strokeStyle="#8a6a30";ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(14,-10);ctx.lineTo(14,-40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(14,-40);ctx.lineTo(28,-30);ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(-18,5);ctx.lineTo(18,5);ctx.lineTo(22,-1);ctx.lineTo(16,-8);ctx.lineTo(-16,-8);ctx.lineTo(-22,-1);
      ctx.closePath();ctx.fillStyle=this.color;ctx.fill();ctx.strokeStyle="#ffffff33";ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle="#ffffff22";ctx.fillRect(-14,-8,28,3);
      ctx.fillStyle="#4a80b0";ctx.fillRect(-6,-19,12,12);
      ctx.fillStyle="#88ccff44";ctx.fillRect(-4,-17,4,6);ctx.fillRect(1,-17,4,6);
      ctx.strokeStyle="#5080a0";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-19);ctx.lineTo(0,-35);ctx.stroke();
      ctx.fillStyle="#50c8ff";ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(8,-31);ctx.lineTo(0,-27);ctx.fill();
      ctx.strokeStyle="#88aacc";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(10,-8);ctx.lineTo(22,-18);ctx.stroke();
      ctx.strokeStyle="#ffffff55";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(22,-18);ctx.lineTo(22,-8);ctx.stroke();
    }
    ctx.restore();
    if(!this.canFish){const ratio=1-this.cd/this.cdMax;ctx.beginPath();ctx.arc(px,py,20*sc,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2);ctx.strokeStyle=CWR;ctx.lineWidth=3;ctx.stroke();}
    if(this.biodivUpgrade)T("🌿",px-8,py-46,"18px serif","","left","top");
    if(this.autoNet)T("AUTO",px,py-46,"bold 12px Courier New",CBL,"center","top");
    if(this.netAnim)this.netAnim.draw(ox);
  }
}

// ECOSYSTEM
// ════════════════════════════════════════════════
class Ecosystem{
  constructor(bounds,nb,isIndustrial){this.bounds=bounds;this.nb=nb;this.isIndustrial=isIndustrial||false;this.fish=[];this.spawn();}
  spawn(){
    this.fish=[];const[x0,y0,x1,y1]=this.bounds;
    for(let i=0;i<this.nb;i++){const prot=Math.random()<PROT_CHANCE;this.fish.push(new Fish(rand(x0+20,x1-20),rand(y0+20,y1-20),false,prot));}
  }
  get population(){return this.fish.length;}
  get protectedCount(){return this.fish.filter(f=>f.protected).length;}
  update(dt){
    this.fish.forEach(f=>f.update(this.bounds,dt));
    if(this.fish.length<2||this.fish.length>=MAX_FISH)return;
    const mult=this.fish.length<LOW_POP_THR?LOW_MULT:1;
    for(let i=0;i<this.fish.length;i++){
      for(let j=i+1;j<this.fish.length;j++){
        const f1=this.fish[i],f2=this.fish[j];
        const dx=f1.x-f2.x,dy=f1.y-f2.y;
        // Pas de reproduction entre bébés + taux réduit si bateau industriel
        const indMult=this.isIndustrial?0.3:1.0;
        if(Math.sqrt(dx*dx+dy*dy)<REPRO_DIST&&!f1.baby&&!f2.baby&&Math.random()<REPRO_CHANCE*mult*indMult){
          this.fish.push(new Fish((f1.x+f2.x)/2,(f1.y+f2.y)/2,true,false));return;
        }
      }
    }
  }
  catch_(boat){
    // catchMax scales with netR upgrades — bigger net = more fish caught
    const baseNetR=boat.boatType==="INDUSTRIAL"?IND_NR:ART_NR;
    const scaledCatch=Math.round(boat.catchMax*(boat.netR/baseNetR));
    const caught=this.fish.filter(f=>{const dx=f.x-boat.x,dy=f.y-boat.y;return Math.sqrt(dx*dx+dy*dy)<=boat.netR;}).slice(0,scaledCatch);
    const coins=caught.reduce((s,f)=>s+f.coinValue(),0);
    const prot=caught.filter(f=>f.protected).length;
    boat.protectedCaughtTotal+=prot;
    caught.forEach(f=>{const i=this.fish.indexOf(f);if(i>-1)this.fish.splice(i,1);});
    return[caught.length,coins];
  }
  draw(ox){ox=ox||0;this.fish.forEach(f=>f.draw(ox));}
}

let waveOff=0;
function drawOcean(x,y,w,h,danger){
  danger=danger||0;
  const deep=danger>0?lerpC("#08143a","#2a0808",Math.min(1,danger)):"#08143a";
  const wave=danger>0?lerpC("#12467a","#5a1010",Math.min(1,danger)):"#12467a";
  ctx.fillStyle=deep;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=danger>0?"rgba(100,20,20,0.1)":"rgba(18,70,122,0.12)";ctx.lineWidth=1;
  for(let oy=y;oy<y+h;oy+=60){ctx.beginPath();ctx.moveTo(x,oy);ctx.lineTo(x+w,oy);ctx.stroke();}
  for(let ox2=x;ox2<x+w;ox2+=60){ctx.beginPath();ctx.moveTo(ox2,y);ctx.lineTo(ox2,y+h);ctx.stroke();}
  ctx.strokeStyle=wave;ctx.lineWidth=2;
  for(let oy=y+20;oy<y+h;oy+=50)
    for(let ox2=x;ox2<x+w;ox2+=90){ctx.beginPath();ctx.arc(ox2+(waveOff*2)%90,oy+14,18,0,Math.PI);ctx.stroke();}
  if(danger>0.2){
    const grd=ctx.createRadialGradient(x+w/2,y+h/2,h*0.2,x+w/2,y+h/2,h*0.7);
    grd.addColorStop(0,"rgba(0,0,0,0)");grd.addColorStop(1,"rgba(180,0,0,"+(danger*0.3)+")");
    ctx.fillStyle=grd;ctx.fillRect(x,y,w,h);
  }
}

class Shop{
  constructor(b1,b2){
    this.b1=b1;this.b2=b2;
    this.p1cursor=0;this.p2cursor=0;
    this.p1done=false;this.p2done=false;
    this.confirmTimer=0;
    this.p1items=this._build(b1);this.p2items=this._build(b2);
  }
  _build(boat){
    const items=[];
    if(boat.boatType==="INDUSTRIAL"){
      items.push({label:"Net range +30",desc:boat.netR+"px => "+(boat.netR+30)+"px",cost:SHOP_IND_RNG,action:()=>boat.netR+=30});
      items.push({label:"Cooldown -0.6s",desc:boat.cdMax.toFixed(1)+"s => "+Math.max(0.6,boat.cdMax-0.6).toFixed(1)+"s",cost:SHOP_IND_CD,action:()=>boat.cdMax=Math.max(0.6,boat.cdMax-0.6)});
    } else {
      const ab=boat.biodivUpgrade;
      items.push({label:"Biodiversity Pact"+(ab?" (active)":""),desc:ab?"Already active!":"Extra prot fish + 30c per survivor",cost:ab?0:SHOP_ART_BIO,action:ab?(()=>{}):(()=>boat.biodivUpgrade=true)});
      const aa=boat.autoNet;
      items.push({label:"Auto-Net"+(aa?" (active)":""),desc:aa?"Already active.":"Net fires automatically!",cost:aa?0:SHOP_ART_AUTO,action:aa?(()=>{}):( ()=>boat.autoNet=true)});
    }
    items.push({label:"Skip",desc:"Keep coins",cost:0,action:()=>{}});
    return items;
  }
  get reallyDone(){return this.p1done&&this.p2done&&this.confirmTimer>=2.0;}
  update(dt,locked){
    if(!locked){
      if(!this.p1done){
        const pad1=this.b1.pid===1?pad.p1:pad.p2;
        shopNav.p1timer+=dt;
        if(shopNav.p1timer>shopNav.COOLDOWN){
          if(pad1.dy<-0.4){this.p1cursor=(this.p1cursor-1+this.p1items.length)%this.p1items.length;shopNav.p1timer=0;}
          else if(pad1.dy>0.4){this.p1cursor=(this.p1cursor+1)%this.p1items.length;shopNav.p1timer=0;}
        }
        if(consumeNet(this.b1.pid)){this._buy(this.b1,this.p1items,this.p1cursor);this.p1done=true;}
      }
      if(!this.p2done){
        const pad2=this.b2.pid===1?pad.p1:pad.p2;
        shopNav.p2timer+=dt;
        if(shopNav.p2timer>shopNav.COOLDOWN){
          if(pad2.dy<-0.4){this.p2cursor=(this.p2cursor-1+this.p2items.length)%this.p2items.length;shopNav.p2timer=0;}
          else if(pad2.dy>0.4){this.p2cursor=(this.p2cursor+1)%this.p2items.length;shopNav.p2timer=0;}
        }
        if(consumeNet(this.b2.pid)){this._buy(this.b2,this.p2items,this.p2cursor);this.p2done=true;}
      }
    }
    if(this.p1done&&this.p2done)this.confirmTimer+=dt;
  }
  handleKey(code,locked){
    if(locked)return;
    if(!this.p1done){
      if(code==="KeyZ"||code==="KeyW")this.p1cursor=(this.p1cursor-1+this.p1items.length)%this.p1items.length;
      else if(code==="KeyS")this.p1cursor=(this.p1cursor+1)%this.p1items.length;
      else if(code==="Space"){this._buy(this.b1,this.p1items,this.p1cursor);this.p1done=true;}
    }
    if(!this.p2done){
      if(code==="ArrowUp")this.p2cursor=(this.p2cursor-1+this.p2items.length)%this.p2items.length;
      else if(code==="ArrowDown")this.p2cursor=(this.p2cursor+1)%this.p2items.length;
      else if(code==="Enter"||code==="NumpadEnter"){this._buy(this.b2,this.p2items,this.p2cursor);this.p2done=true;}
    }
  }
  _buy(boat,items,idx){const it=items[idx];if(boat.coinsTotal>=it.cost){boat.coinsTotal-=it.cost;it.action();}}
}

// ════════════════════════════════════════════════
// ROUND
// ════════════════════════════════════════════════
class GameRound{
  constructor(num,b1,b2,f1,f2){
    this.num=num;this.b1=b1;this.b2=b2;
    this.bounds=[0,HH,PW,SH];
    this.eco1=new Ecosystem(this.bounds,f1,b1.boatType==="INDUSTRIAL");this.eco2=new Ecosystem(this.bounds,f2,b2.boatType==="INDUSTRIAL");
    const[x0,y0,x1,y1]=this.bounds;
    if(b1.biodivUpgrade)for(let i=0;i<5;i++)this.eco1.fish.push(new Fish(rand(x0+30,x1-30),rand(y0+30,y1-30),false,true));
    if(b2.biodivUpgrade)for(let i=0;i<5;i++)this.eco2.fish.push(new Fish(rand(x0+30,x1-30),rand(y0+30,y1-30),false,true));
    b1.x=b2.x=PW/2;b1.y=b2.y=SH/2;b1.reset();b2.reset();
    this.timeLeft=ROUND_DUR;this.done=false;
  }
  _catch(boat,eco){const[n,coins]=eco.catch_(boat);boat.coinsRound+=coins;boat.coinsTotal+=coins;}
  update(dt){
    if(this.done)return;
    this.timeLeft-=dt;
    if(this.timeLeft<=0){this.timeLeft=0;this.done=true;return;}
    this.b1.update(dt,this.bounds);this.b2.update(dt,this.bounds);
    if(this.b1.autoNet&&this.b1.canFish){if(this.b1.throwNet())this._catch(this.b1,this.eco1);}
    if(this.b2.autoNet&&this.b2.canFish){if(this.b2.throwNet())this._catch(this.b2,this.eco2);}
    if(!this.b1.autoNet&&consumeNet(this.b1.pid)){if(this.b1.throwNet())this._catch(this.b1,this.eco1);}
    if(!this.b2.autoNet&&consumeNet(this.b2.pid)){if(this.b2.throwNet())this._catch(this.b2,this.eco2);}
    this.eco1.update(dt);this.eco2.update(dt);
  }
  keyDown(code){
    if(code==="Space"&&!this.b1.autoNet){if(this.b1.throwNet())this._catch(this.b1,this.eco1);}
    if((code==="Enter"||code==="NumpadEnter")&&!this.b2.autoNet){if(this.b2.throwNet())this._catch(this.b2,this.eco2);}
  }
}

// ════════════════════════════════════════════════
// TAXES
// ════════════════════════════════════════════════
function computeTaxes(){
  b1BioBonus=b1.biodivUpgrade?currentRound.eco1.protectedCount*PROT_BONUS:0;
  b2BioBonus=b2.biodivUpgrade?currentRound.eco2.protectedCount*PROT_BONUS:0;
  function at(boat,bb){
    const raw=boat.coinsTotal,pp=boat.protectedCaughtTotal*PROT_PEN,ap=raw+pp+bb;
    return boat.boatType==="INDUSTRIAL"?Math.floor(ap*(1-ECO_TAX)):ap;
  }
  b1AfterTax=at(b1,b1BioBonus);b2AfterTax=at(b2,b2BioBonus);
  b1ProtPen=b1.protectedCaughtTotal*PROT_PEN;b2ProtPen=b2.protectedCaughtTotal*PROT_PEN;
  scores.unshift({
    date:new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}),
    p1type:b1.boatType,p1raw:b1.coinsTotal,p1tax:b1AfterTax,
    p2type:b2.boatType,p2raw:b2.coinsTotal,p2tax:b2AfterTax,
    taxWinner:b1AfterTax>b2AfterTax?"P1 ("+b1.label+")":b2AfterTax>b1AfterTax?"P2 ("+b2.label+")":"DRAW"
  });
  if(scores.length>10)scores.length=10;
}

// ════════════════════════════════════════════════
// KEY HANDLER
// ════════════════════════════════════════════════
function goToState(newState){
  if(state!=="PLAYING"&&state!=="SHOP")prevState=state;
  state=newState;
  pageTransitionTimer=PAGE_LOCK;
  pad.p1.netJust=false;pad.p2.netJust=false;
  pad.p1.backJust=false;pad.p2.backJust=false;
  pad.p1.netHeld=false;pad.p2.netHeld=false;
}
function goBack(){
  if(isLocked())return;
  if(state==="QUIZ")goToState("INTRO");
  else if(state==="BOAT_SELECT"){goToState("QUIZ");startQuiz();}
  else if(state==="INTRO"&&introPage===1){introPage=0;pageTransitionTimer=PAGE_LOCK;}
  else if(state==="GAMEOVER"&&ga.phase===3&&ga.timer>=GA_PHASE3_LOCK)goToState("SCOREBOARD");
  else if(state==="SCOREBOARD")goToState("GAMEOVER");
}
function isLocked(){return pageTransitionTimer>0;}

function handleKey(code){
  if(state==="SPLASH"){splashSkip=true;}
  else if(state==="INTRO"){
    if(code==="Space"||code==="Enter"||code==="NumpadEnter"){
      if(introPage===0)introPage=1;
      else startQuiz();
    }
  } else if(state==="QUIZ"){
    if(code==="Escape")goBack();
    // keyboard fallback for quiz sliders
    if(!quizDone){
      if(code==="KeyA")quizP1guess=Math.max(quizQ.min,quizP1guess-1);
      if(code==="KeyD")quizP1guess=Math.min(quizQ.max,quizP1guess+1);
      if(code==="ArrowLeft")quizP2guess=Math.max(quizQ.min,quizP2guess-1);
      if(code==="ArrowRight")quizP2guess=Math.min(quizQ.max,quizP2guess+1);
      if(code==="Space")quizP1locked=true;
      if(code==="Enter"||code==="NumpadEnter")quizP2locked=true;
      if(quizP1locked&&quizP2locked)lockQuiz();
    }
  } else if(state==="BOAT_SELECT"){
    if(code==="Escape")goBack();
    if(!boatSelectDone){
      if(code==="ArrowLeft"||code==="ArrowRight"||code==="KeyA"||code==="KeyD")
        boatSelectChoice=boatSelectChoice===0?1:0;
      if(code==="Space"||code==="Enter"||code==="NumpadEnter")confirmBoatSelect();
    }
  } else if(state==="PLAYING"){
    currentRound.keyDown(code);
  } else if(state==="SHOP"){
    shop.handleKey(code,shopLockTimer<SHOP_DELAY);
  } else if(state==="GAMEOVER"){
    if(ga.phase===1&&ga.timer>=GA_PHASE1_LOCK&&(code==="Space"||code==="Enter"||code==="NumpadEnter")){ga.phase=2;ga.timer=0;}
    else if(ga.phase===3){
      if(ga.timer>=GA_PHASE3_LOCK){
        if(code==="KeyS")goToState("SCOREBOARD");
        else if(code==="KeyR")resetGame();
        else if(code==="Escape")resetGame();
      }
    }
  } else if(state==="SCOREBOARD"){
    if(code==="KeyR")resetGame();else if(code==="Escape")goToState("GAMEOVER");
  }
}

function handlePadMenus(){
  if(isLocked())return;
  // Bouton retour (back) — fonctionne dans tous les états menu
  if(consumeBack())goBack();
  if(state==="SPLASH"&&anyNet())splashSkip=true;
  else if(state==="INTRO"&&anyNet()){if(introPage===0){introPage=1;pageTransitionTimer=PAGE_LOCK;}else startQuiz();}
  else if(state==="QUIZ"&&!quizDone){
    if(!quizP1locked&&consumeNet(1)){quizP1locked=true;}
    if(!quizP2locked&&consumeNet(2)){quizP2locked=true;}
    if(quizP1locked&&quizP2locked)lockQuiz();
  }
  else if(state==="BOAT_SELECT"&&!boatSelectDone){
    // winner uses their joystick to select
    const wp=boatSelectWinner;
    const p=wp===1?pad.p1:pad.p2;
    if(Math.abs(p.dx)>0.4)boatSelectChoice=p.dx<0?0:1;
    if(consumeNet(wp))confirmBoatSelect();
  } else if(state==="GAMEOVER"){
    if(ga.phase===1&&ga.timer>=GA_PHASE1_LOCK&&anyNet()){ga.phase=2;ga.timer=0;}
    else if(ga.phase===3&&ga.timer>=GA_PHASE3_LOCK&&anyNet())goToState("SCOREBOARD");
  } else if(state==="SCOREBOARD"&&anyNet())resetGame();
}

function startQuiz(){
  quizQ=choice(QUESTIONS);
  quizP1guess=Math.round((quizQ.min+quizQ.max)/2);
  quizP2guess=Math.round((quizQ.min+quizQ.max)/2)+5;
  quizDone=false;quizWinner=null;quizRevealTimer=0;quizP1locked=false;quizP2locked=false;
  state="QUIZ";
}

function lockQuiz(){
  const d1=Math.abs(Math.round(quizP1guess)-quizQ.answer);
  const d2=Math.abs(Math.round(quizP2guess)-quizQ.answer);
  quizWinner=d1<=d2?1:2;
  quizDone=true;quizRevealTimer=0;
}

function confirmBoatSelect(){
  boatSelectDone=true;
  // Gauche (b1, eco1, LEDs 0-59)  = toujours INDUSTRIAL
  // Droite (b2, eco2, LEDs 60-119)= toujours ARTISANAL
  // Les pids suivent les joueurs → les contrôles ne bougent pas.
  const winnerChoseInd = boatSelectChoice===0;
  const p1IsInd = (boatSelectWinner===1 && winnerChoseInd)||(boatSelectWinner===2 && !winnerChoseInd);
  const indPid = p1IsInd?1:2;
  const artPid = p1IsInd?2:1;
  b1=new Boat(indPid,"INDUSTRIAL",PW/2,SH/2); // gauche
  b2=new Boat(artPid,"ARTISANAL", PW/2,SH/2); // droite
  rnum++;currentRound=new GameRound(rnum,b1,b2,nb1,nb2);
  document.getElementById("overlay").classList.add("hidden");
  countdownTimer=COUNTDOWN_DUR;
  setTimeout(()=>{state="COUNTDOWN";},600);
}

function drawSplash(dt){
  splashTimer+=dt;
  ctx.fillStyle="#000";ctx.fillRect(0,0,SW,SH);
  if(logoImg.complete&&logoImg.naturalWidth>0){
    const aspect=logoImg.naturalHeight/logoImg.naturalWidth;
    const maxW=420,maxH=maxW*aspect;
    const ZOOM=1.8,HOLD=0.9,FADE=0.7;
    let scale,alpha;
    if(splashTimer<ZOOM){const t=easeOut(splashTimer/ZOOM);scale=0.2+t*0.8;alpha=Math.min(1,splashTimer/(ZOOM*0.35));}
    else if(splashTimer<ZOOM+HOLD){scale=1;alpha=1;}
    else{const t=(splashTimer-(ZOOM+HOLD))/FADE;scale=1+t*0.06;alpha=Math.max(0,1-t);}
    const w=maxW*scale,h=maxH*scale;
    // Glow behind logo
    if(alpha>0.1){
      const grd=ctx.createRadialGradient(SW/2,SH/2,0,SW/2,SH/2,w*0.8);
      grd.addColorStop(0,"rgba(80,200,255,"+(alpha*0.25)+")");
      grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=grd;ctx.fillRect(0,0,SW,SH);
    }
    // Draw logo without background rectangle — use drawImage directly on transparent canvas
    ctx.save();ctx.globalAlpha=alpha;
    ctx.drawImage(logoImg,SW/2-w/2,SH/2-h/2,w,h);
    ctx.restore();
  } else {
    TC("BLUEGUARD",SH/2-20,"bold 60px Courier New",CBL);
  }
  if(splashSkip||splashTimer>=3.5){state="INTRO";splashTimer=0;}
}

function updateGa(dt){
  if(ga.phase===0){
    ga.timer+=dt;const speed=220;
    ga.p1raw=Math.min(b1.coinsTotal,Math.floor(ga.timer*speed));
    ga.p2raw=Math.min(b2.coinsTotal,Math.floor(ga.timer*speed));
    if(ga.p1raw>=b1.coinsTotal&&ga.p2raw>=b2.coinsTotal&&!ga.rawDone){ga.rawDone=true;ga.phase=1;ga.timer=0;}
  } else if(ga.phase===1){
    ga.timer+=dt; // ga.timer sert ici de décompte avant de pouvoir appuyer
  } else if(ga.phase===2){
    ga.timer+=dt;ga.taxAnimT=Math.min(1,ga.timer/1.4);
    ga.p1tax=Math.round(b1.coinsTotal+(b1AfterTax-b1.coinsTotal)*easeIO(ga.taxAnimT));
    ga.p2tax=Math.round(b2.coinsTotal+(b2AfterTax-b2.coinsTotal)*easeIO(ga.taxAnimT));
    if(ga.taxAnimT>=1){
      ga.phase=3;ga.timer=0;
      // Envoyer resultat audit aux LEDs
      if(!ga.ledSent){
        ga.ledSent=true;
        const artWins=(b1AfterTax>b2AfterTax&&b1.boatType==="ARTISANAL")||(b2AfterTax>b1AfterTax&&b2.boatType==="ARTISANAL");
        sendWS({type:"audit_result",result:artWins?"artisanal_wins":"industrial_wins"});
      }
    }
  } else if(ga.phase===3){
    ga.timer+=dt; // décompte avant de pouvoir continuer vers le scoreboard
  }
}

  if(!scores.length)TC("No games yet.",SH/2,"bold 19px Courier New",CM);
  scores.forEach((e,ri)=>{
    const ry=120+ri*28;if(ri%2===0){ctx.fillStyle="#09173a";ctx.fillRect(35,ry-2,SW-70,26);}
    const t1c=e.p1type==="INDUSTRIAL"?IND_COL:ART_COL,t2c=e.p2type==="INDUSTRIAL"?IND_COL:ART_COL;
    const wc=e.taxWinner.includes("ARTISANAL")?CGR:e.taxWinner.includes("INDUSTRIAL")?CR:CWR;
    [[e.date,CT],[e.p1type.slice(0,3),t1c],[String(e.p1raw),CT],[String(e.p1tax),t1c],[e.p2type.slice(0,3),t2c],[String(e.p2raw),CT],[String(e.p2tax),t2c],[e.taxWinner,wc]].forEach(([tx,c],i)=>T(tx,cols[i],ry,"12px Courier New",c,"left","top"));
  });
  TC("Press the button for a New Game",SH-38,"bold 22px Courier New",CBL);
}

// ════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);last=ts;
  ctx.clearRect(0,0,SW,SH);ctx.fillStyle=CD;ctx.fillRect(0,0,SW,SH);
  if(pageTransitionTimer>0)pageTransitionTimer-=dt;

  if(state!=="PLAYING"&&state!=="SHOP"&&state!=="BETWEEN_ANIM"&&state!=="COUNTDOWN")handlePadMenus();

  // Updates
  if(state==="PLAYING"){
    currentRound.update(dt);
    if(currentRound.done){
      nb1=currentRound.eco1.population;nb2=currentRound.eco2.population;
      nb1=currentRound.eco1.population;nb2=currentRound.eco2.population;
      hist.push([nb1,nb2,b1.coinsRound,b2.coinsRound]);
      if(rnum<NUM_ROUNDS){
        // Between animation before shop
        betweenTimer=BETWEEN_DUR;state="BETWEEN_ANIM";
      } else {
        computeTaxes();state="GAMEOVER";
      }
    }
  } else if(state==="BETWEEN_ANIM"){
    betweenTimer-=dt;
    if(betweenTimer<=0){
      shop=new Shop(b1,b2);shopLockTimer=0;shopNav.p1timer=0;shopNav.p2timer=0;pad.p1.netJust=false;pad.p2.netJust=false;pad.p1.netHeld=false;pad.p2.netHeld=false;state="SHOP";
    }
  } else if(state==="SHOP"){
    shopLockTimer+=dt;
    const locked=shopLockTimer<SHOP_DELAY;
    // Pendant le verrou: vider les pressions pour eviter le missclick
    if(locked){pad.p1.netJust=false;pad.p2.netJust=false;}
    shop.update(dt,locked);
    if(shop.reallyDone){
      rnum++;currentRound=new GameRound(rnum,b1,b2,nb1,nb2);state="PLAYING";
    }
  } else if(state==="QUIZ"){
    // joystick slider update handled inside drawQuiz
  } else if(state==="COUNTDOWN"){
    pad.p1.netJust=false;pad.p2.netJust=false;
  }

  // Draw
  if(state==="SPLASH")drawSplash(dt);
  else if(state==="INTRO")drawIntro();
  else if(state==="QUIZ")drawQuiz(dt);
  else if(state==="BOAT_SELECT")drawBoatSelect(dt);
  else if(state==="COUNTDOWN")drawCountdown(dt);
  else if(state==="PLAYING")drawGame(currentRound);
  else if(state==="BETWEEN_ANIM"){drawGame(currentRound);drawBetweenAnim(currentRound,betweenTimer);}
  else if(state==="SHOP")drawShop(shop,rnum,shopLockTimer);
  else if(state==="GAMEOVER")drawGameover(dt);
  else if(state==="SCOREBOARD")drawScoreboard();

  requestAnimationFrame(loop);
}

connectWS();
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(loop);});

// ── Envoi niveau de poissons aux LEDs toutes les 2s ──
setInterval(()=>{
  if(currentRound&&wsConn){
    // pop1 = cote gauche (rouleau 1, LEDs 0-59) = bateau P1
    // pop2 = cote droit  (rouleau 2, LEDs 60-119) = bateau P2
    sendWS({
      type:"fish_count",
      pop1:currentRound.eco1.population,
      pop2:currentRound.eco2.population,
      max_fish:MAX_FISH
    });
  }
},1000);
</script>
